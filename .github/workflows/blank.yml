name: 自动打包彩虹聚合DNS管理系统 Docker FPK 并更新仓库

on:
  workflow_dispatch:
    inputs:
      debug_mode:
        description: "true=只打包不推送，false=生产推送"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: '0 0 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  DEBUG_MODE: ${{ github.event.inputs.debug_mode || 'false' }}

  APP_ID: "fpk-dnsmgr"
  APP_NAME: "彩虹聚合DNS管理系统"
  BASE_DIR: "fpk-dnsmgr"

  DOCKER_IMAGE: "netcccyun/dnsmgr"
  FNPACK_VERSION: "1.2.1"
  FNPACK_PLATFORM: "linux-amd64"
  FNPACK_BASE_URL: "https://static2.fnnas.com/fnpack"

  PACKAGE_DIR: "/tmp/fpk_build"
  RELEASE_ARCH_NAME: "all"

  FNDEPOT_REPO: "moxyis/FnDepot"
  FNDEPOT_BRANCH: "main"
  FNDEPOT_APP_DIR: "fpk-dnsmgr"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6

      - name: 安装依赖
        run: |
          sudo apt update
          sudo apt install -y jq curl skopeo unzip

      - name: 初始化环境
        id: init
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          BUILD_TIME=$(TZ='Asia/Shanghai' date "+%Y-%m-%d %H:%M:%S")
          echo "build_time=$BUILD_TIME" >> "$GITHUB_OUTPUT"

      - name: 获取本地版本
        id: local_ver
        run: |
          MANIFEST="$BASE_DIR/manifest"
          if [ ! -f "$MANIFEST" ]; then
            mkdir -p "$BASE_DIR"
            echo "version = 0.0.0" > "$MANIFEST"
            echo "platform = all" >> "$MANIFEST"
          fi
          LOCAL_VERSION=$(sed -n 's/^[[:space:]]*version[[:space:]]*[:=][[:space:]]*//p' "$MANIFEST" | xargs)
          echo "local_version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"

      - name: 获取 GitHub 最新版本
        id: remote_ver
        run: |
          REMOTE_VERSION=$(curl -sSL -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/netcccyun/dnsmgr/releases/latest" \
            | jq -r '.tag_name' | sed 's/^v//')
          echo "remote_version=$REMOTE_VERSION" >> "$GITHUB_OUTPUT"

      - name: 判断是否需要更新
        id: compare
        run: |
          LOCAL_VER="${{ steps.local_ver.outputs.local_version }}"
          REMOTE_VER="${{ steps.remote_ver.outputs.remote_version }}"
          if [ "$LOCAL_VER" != "$REMOTE_VER" ] || [ "$DEBUG_MODE" = "true" ]; then
            echo "need_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "need_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 下载并安装 fnpack
        if: steps.compare.outputs.need_update == 'true'
        run: |
          FNPACK_URL="https://static2.fnnas.com/fnpack/fnpack-1.2.1-linux-amd64"
          curl -L "$FNPACK_URL" -o /tmp/fnpack
          chmod +x /tmp/fnpack
          sudo mv /tmp/fnpack /usr/local/bin/fnpack
          fnpack --version

      - name: 更新 manifest platform 为 all
        if: steps.compare.outputs.need_update == 'true'
        run: |
          sed -i -E "s/(^[[:space:]]*platform[[:space:]]*[:=][[:space:]]*)([\"']?).*(\"?)$/\1\2all\3/" "$BASE_DIR/manifest"

      - name: 执行 fnpack 打包
        if: steps.compare.outputs.need_update == 'true'
        run: |
          cd "$BASE_DIR"
          fnpack build
          mkdir -p "$PACKAGE_DIR"
          FPK_FILE=$(find . -name "*.fpk" | head -n1)
          cp "$FPK_FILE" "$PACKAGE_DIR/${APP_ID}-v${{ steps.remote_ver.outputs.remote_version }}-all.fpk"
          cp "$FPK_FILE" "$PACKAGE_DIR/${APP_ID}.fpk"

      - name: 克隆 FnDepot
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          git clone "https://${{ secrets.FnDepot_PAT }}@github.com/${FNDEPOT_REPO}.git" /tmp/FnDepot

      - name: 复制 FPK 到 FnDepot
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          mkdir -p "/tmp/FnDepot/$FNDEPOT_APP_DIR"
          cp "$PACKAGE_DIR/${APP_ID}.fpk" "/tmp/FnDepot/$FNDEPOT_APP_DIR/"

      - name: 更新 FnDepot fnpack.json
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          JSON_FILE="/tmp/FnDepot/fnpack.json"
          [ ! -f "$JSON_FILE" ] && echo '{}' > "$JSON_FILE"
          jq --arg app "$APP_ID" --arg ver "${{ steps.remote_ver.outputs.remote_version }}" \
            '.[$app] = (.[$app] // {}) | .[$app].version = $ver' \
            "$JSON_FILE" > "$JSON_FILE.tmp"
          mv "$JSON_FILE.tmp" "$JSON_FILE"

      - name: 更新 FnDepot README
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          README_FILE="/tmp/FnDepot/README.md"
          SOURCE_URL="https://github.com/netcccyun/dnsmgr/releases/tag/${{ steps.remote_ver.outputs.remote_version }}"
          NEW_ROW="| **${APP_NAME}** | ${{ steps.remote_ver.outputs.remote_version }} | ${SOURCE_URL} | GitHub |"
          if [ ! -f "$README_FILE" ]; then
            { echo "# FnDepot"; echo ""; echo "| 应用名称 | 版本号 | 来源 | 类型 |"; echo "|---|---|---|---|"; echo "$NEW_ROW"; } > "$README_FILE"
          elif grep -qF "**${APP_NAME}**" "$README_FILE"; then
            awk -v app="$APP_NAME" -v row="$NEW_ROW" '$0 ~ "\\*\\*" app "\\*\\*" {print row; next} {print}' "$README_FILE" > "$README_FILE.tmp"
            mv "$README_FILE.tmp" "$README_FILE"
          else
            { echo "$NEW_ROW"; } >> "$README_FILE"
          fi

      - name: 提交 FnDepot 变更
        if: steps.compare.outputs.need_update == 'true' && env.DEBUG_MODE == 'false'
        run: |
          cd /tmp/FnDepot
          git add "$FNDEPOT_APP_DIR/" fnpack.json README.md
          git commit -m "chore: 更新 ${APP_NAME} v${{ steps.remote_ver.outputs.remote_version }}" || echo "无变更"
          git push origin "$FNDEPOT_BRANCH"
